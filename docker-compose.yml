version: "3.9"

services:

  # ── Ollama (local LLM) ───────────────────────────────────────────────────────
  ollama:
    image: ollama/ollama:latest
    container_name: bankiq_ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    # GPU passthrough (NVIDIA) — comment out if no GPU
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11434/"]
      interval: 30s
      timeout: 10s
      retries: 5

  # ── Pull Mistral model on first boot ─────────────────────────────────────────
  ollama-pull:
    image: ollama/ollama:latest
    container_name: bankiq_ollama_pull
    depends_on:
      ollama:
        condition: service_healthy
    entrypoint: ["ollama", "pull", "mistral"]
    environment:
      - OLLAMA_HOST=http://ollama:11434
    restart: "no"

  # ── FastAPI Backend ───────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: bankiq_backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - uploads_data:/app/uploads
      - faiss_data:/app/faiss_index
      - ./mock_onedrive:/app/mock_onedrive:ro
    environment:
      - OLLAMA_BASE_URL=http://ollama:11434
      - USE_GPU=false   # set true if GPU available in container
    env_file:
      - ./backend/.env
    depends_on:
      - ollama
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 20s
      timeout: 5s
      retries: 5

  # ── React Frontend (dev) ─────────────────────────────────────────────────────
  frontend:
    image: node:20-alpine
    container_name: bankiq_frontend
    working_dir: /app
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    command: sh -c "npm install && npm run dev -- --host"
    environment:
      - VITE_API_URL=http://localhost:8000
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  ollama_data:
  uploads_data:
  faiss_data:
